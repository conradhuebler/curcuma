name: AutomaticBuild

on:
  push:
    branches: [ master ] #Everytime master branch is updated
    # paths: ['.github/workflows/*',  'src/*'] #only when these files are modifed
  pull_request:
    branches: [ master ] #for every pull request going to master
    # paths: ['.github/workflows/*', 'src/*'] #only when these files are modifed

jobs:

  makerelease:
    runs-on: ubuntu-latest
    outputs:
      version: 0.0.${{ github.run_number }}
    steps:
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: 0.0.${{ github.run_number }}
          name: Curcuma 0.0.${{ github.run_number }}
          draft: false
          prerelease: true

  linux_20:
    needs: [makerelease]
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Cache FetchContent dependencies
      uses: actions/cache@v4
      with:
        path: |
          release_xtb/_deps
          external/fmt
          external/LBFGSpp
          external/CxxThreadPool
          external/ripser
          external/cpp-d4
        key: fetchcontent-${{ hashFiles('CMakeLists.txt') }}

    - uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: liblapacke-dev libatlas-base-dev libopenblas-dev libblas-dev liblapack-dev gfortran-12
        version: 1.0

    - name: Build
      run: sh scripts/build_unix_github.sh

    - name: Deploy
      run: sh scripts/deploy_unix_github_20_04.sh

    - name: Upload Release Asset
      uses: svenstaro/upload-release-action@v2
      with:
        file: ./package/curcuma-nightly-x86_64.AppImage
        asset_name: curcuma-nightly-${{ needs.makerelease.outputs.version }}-20_04-x86_64-Linux.AppImage
        asset_content_type: application/zip
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        tag: 0.0.${{ github.run_number }}

  windows:
    needs: [makerelease]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up MinGW
        uses: e-t-l/setup-mingw@patch-1
        with:
            platform: x64

      - name: Build
        run: scripts/build_windows.bat

      - name: Upload Release Asset
        uses: svenstaro/upload-release-action@v2
        with:
          file: ./curcuma-windows.zip
          asset_name: curcuma-nightly-${{ needs.makerelease.outputs.version }}-windows-x86_64.zip
          asset_content_type: application/zip
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: 0.0.${{ github.run_number }}
